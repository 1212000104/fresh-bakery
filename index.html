<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Bakery 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-deep: #c2185b;
    --pink-main: #e91e8c;
    --pink-mid: #f48fb1;
    --pink-light: #fce4ec;
    --pink-pale: #fff0f6;
    --pink-bg: #ffd6e7;
    --gold: #d4a017;
    --cream: #fff8f0;
    --text-dark: #3a1a2e;
    --text-mid: #6d3b58;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Nunito’, sans-serif;
background: linear-gradient(135deg, #ffd6e7 0%, #ffb3d1 30%, #fce4ec 60%, #ff99c2 100%);
min-height: 100vh;
color: var(–text-dark);
overflow-x: hidden;
}

/* Floating decorations */
body::before {
content: ‘’;
position: fixed;
top: -100px; left: -100px;
width: 400px; height: 400px;
background: radial-gradient(circle, rgba(255,192,203,0.5) 0%, transparent 70%);
border-radius: 50%;
pointer-events: none;
z-index: 0;
animation: float 8s ease-in-out infinite;
}
body::after {
content: ‘’;
position: fixed;
bottom: -80px; right: -80px;
width: 350px; height: 350px;
background: radial-gradient(circle, rgba(233,30,140,0.15) 0%, transparent 70%);
border-radius: 50%;
pointer-events: none;
z-index: 0;
animation: float 10s ease-in-out infinite reverse;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-30px)} }
